apiVersion: apps/v1
kind: Deployment
metadata:
  name: tree-dashboard
  labels:
    app: tree-dashboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tree-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tree-dashboard
    spec:
      containers:
      - name: dashboard
        image: tree-dashboard:latest
        ports:
        - containerPort: 8050
        env:
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: postgres-host
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-host
        - name: ELASTICSEARCH_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: elasticsearch-host
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8050
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8050
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tree-dashboard
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8050
  selector:
    app: tree-dashboard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tree-dashboard-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tree-dashboard
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  postgres-host: "postgres-service"
  redis-host: "redis-service"
  elasticsearch-host: "elasticsearch-service"